<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Aspirina - Química3D</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.4/3Dmol-min.js"></script>

<style>

body{

    margin:0;

    font-family:Arial, sans-serif;

    background:#f5f5f5;

    text-align:center;

}

    margin:20px 0 10px;

}

    width:100%;

    height:80vh;

}

    display:inline-block;

    margin:20px;

    color:#2E5EAA;

    text-decoration:none;

    font-weight:bold;

}

</style>

</head>

<body>

<h1>Aspirina</h1>

<p>Ácido acetilsalicílico (C₉H₈O₄)</p>

<div id="viewer"></div>

<a href="../farmacos.html">← Volver a Fármacos</a>

<script>

let viewer = $3Dmol.createViewer("viewer",{

    backgroundColor:"white"

});

const pdb = `

HETATM    1  C1  UNL     1      -2.722   0.235   0.001  1.00  0.00           C
HETATM    2  C2  UNL     1      -1.340   0.176   0.000  1.00  0.00           C
HETATM    3  C3  UNL     1      -0.615  -1.019  -0.001  1.00  0.00           C
HETATM    4  C4  UNL     1       0.767  -1.078  -0.002  1.00  0.00           C
HETATM    5  C5  UNL     1       1.492   0.118  -0.001  1.00  0.00           C
HETATM    6  C6  UNL     1       0.110   0.177   0.000  1.00  0.00           C
HETATM    7  C7  UNL     1       2.978   0.057  -0.002  1.00  0.00           C
HETATM    8  O1  UNL     1       3.594   1.147  -0.003  1.00  0.00           O
HETATM    9  O2  UNL     1       3.610  -1.101  -0.002  1.00  0.00           O
HETATM   10  C8  UNL     1       5.051  -1.136  -0.003  1.00  0.00           C
HETATM   11  C9  UNL     1      -0.646   1.489   0.002  1.00  0.00           C
HETATM   12  O3  UNL     1      -1.975   1.463   0.002  1.00  0.00           O
HETATM   13  O4  UNL     1       0.078   2.577   0.004  1.00  0.00           O
END

`;

viewer.addModel(pdb,"pdb");

viewer.setStyle({},{

    stick:{},

    sphere:{scale:0.28}

});

viewer.zoomTo();

viewer.render();

</script>

</body>
</html>
