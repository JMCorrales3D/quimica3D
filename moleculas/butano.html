<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Butano | Química3D</title>

  <script src="https://3Dmol.org/build/3Dmol-min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: white;
    }

    /* Barra superior */
    .titulo {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      color: #222;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      z-index: 1000;
    }

    /* Visor */
    #viewer {
      width: 100%;
      height: 100vh;
    }

    /* Crédito */
    .credito {
      position: fixed;
      bottom: 12px;
      right: 12px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.85);
      border-radius: 8px;
      font-size: 13px;
      color: #666;
      text-decoration: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: all .2s ease;
      z-index: 1000;
    }

    .credito:hover {
      background: white;
      color: #0d6efd;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="titulo">
    🧪 Butano (C₄H₁₀)
  </div>

  <div id="viewer"></div>

  <a class="credito"
     href="https://jmcorrales3d.github.io/quimica3D/"
     target="_blank"
     title="Ir a Química3D">
     🧪 Química3D · Juana M. Corrales
  </a>

  <script>

    const viewer = $3Dmol.createViewer("viewer", {
      backgroundColor: "white"
    });

    // Butano - CID 7843
    fetch("https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/CID/7843/SDF?record_type=3d")
      .then(response => response.text())
      .then(data => {

        viewer.addModel(data, "sdf");

        viewer.setStyle({}, {
          stick: {
            radius: 0.18
          },
          sphere: {
            scale: 0.25
          }
        });

        viewer.zoomTo();
        viewer.render();

      })
      .catch(error => {
        console.error("Error al cargar la molécula:", error);
      });

  </script>

</body>
</html>
