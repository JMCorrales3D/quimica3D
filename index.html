<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Química3D | Biblioteca interactiva de estructuras químicas</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    font-family:Arial, Helvetica, sans-serif;

    background:#fafafa;

    color:#333;

    line-height:1.6;

}

/* ===========================
   HERO
=========================== */

header{

    background:#cbbbfc;

    padding:90px 25px;

    text-align:center;

}

header h1{

    font-size:4rem;

    margin-bottom:20px;

    color:#222;

}

header h2{

    font-size:1.8rem;

    font-weight:normal;

    margin-bottom:30px;

}

header p{

    max-width:850px;

    margin:auto;

    font-size:1.15rem;

    color:#444;

}

.contador{

    margin-top:35px;

    display:inline-block;

    padding:14px 28px;

    background:white;

    border-radius:15px;

    font-size:1.2rem;

    font-weight:bold;

    box-shadow:0 4px 14px rgba(0,0,0,.10);

}

/* ===========================
   CONTENIDO
=========================== */

main{

    max-width:1200px;

    margin:auto;

    padding:70px 25px;

}

/* ===========================
   BUSCADOR
=========================== */

.buscador{

    margin:50px auto;

    max-width:700px;

}

.buscador input{

    width:100%;

    padding:18px 24px;

    border:none;

    border-radius:14px;

    font-size:1.1rem;

    background:white;

    box-shadow:0 3px 12px rgba(0,0,0,.08);

    outline:none;

}

.buscador input:focus{

    box-shadow:0 0 0 3px #cbbbfc;

}

/* ===========================
   TITULOS
=========================== */

h2{

    text-align:center;

    color:#8a6fd1;

    margin:70px 0 40px;

    font-size:2rem;

}

/* ===========================
   CATEGORÍAS
=========================== */

.categorias{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

    gap:25px;

    margin-bottom:80px;

}

.categoria{

    background:white;

    border-radius:18px;

    padding:28px;

    text-align:center;

    text-decoration:none;

    color:#333;

    box-shadow:0 6px 18px rgba(0,0,0,.08);

    transition:.25s;

}

.categoria:hover{

    transform:translateY(-6px);

    box-shadow:0 12px 28px rgba(0,0,0,.12);

}

.categoria h3{

    margin-bottom:10px;

    color:#8a6fd1;

}

.categoria p{

    color:#666;

    font-size:.95rem;

}

/* ===========================
   TARJETAS
=========================== */

.seccion{

    margin-top:90px;

}

.seccion h3{

    color:#8a6fd1;

    margin-bottom:30px;

    font-size:1.8rem;

}

.tarjetas{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

}

.card{

    background:white;

    border-radius:16px;

    padding:22px;

    text-align:center;

    box-shadow:0 5px 15px rgba(0,0,0,.08);

    transition:.2s;

}

.card:hover{

    transform:translateY(-4px);

}

.card h4{

    margin-bottom:12px;

    font-size:1.2rem;

}

.formula{

    color:#666;

    margin-bottom:18px;

    font-size:1rem;

}

.card a{

    display:inline-block;

    text-decoration:none;

    background:#cbbbfc;

    color:#333;

    padding:10px 18px;

    border-radius:10px;

    font-weight:bold;

}

.card a:hover{

    background:#b8a5fa;

}

/* ===========================
   PRÓXIMAMENTE
=========================== */

.proximamente{

    background:#f3f3f3;

    color:#777;

}

/* ===========================
   FOOTER
=========================== */

footer{

    margin-top:90px;

    padding:35px;

    text-align:center;

    background:#eeeeff;

    color:#666;

}

/* ===========================
   RESPONSIVE
=========================== */

@media(max-width:768px){

header h1{

    font-size:3rem;

}

header h2{

    font-size:1.4rem;

}

}

</style>

</head>

<body>

<header>

<h1>🧪 Química3D</h1>

<h2>Biblioteca interactiva de estructuras químicas</h2>

<p>

Explora moléculas, biomoléculas y estructuras tridimensionales para aprender Química de forma visual e interactiva.

</p>

<div class="contador">

📚 35 estructuras disponibles

</div>

</header>

<main>
